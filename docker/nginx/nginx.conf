events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;
        client_max_body_size 20m;

        # Public file access: http://localhost/uploads/{objectKey}
        location /uploads/ {
            proxy_set_header Host $host;
            proxy_pass http://minio:9000/juejin-media/;
        }

        # If backend runs on host machine (local dev), proxy API here.
        # When backend is containerized, replace with its container name.
        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://host.docker.internal:8080;
        }

        location / {
            return 404;
        }
    }
}
