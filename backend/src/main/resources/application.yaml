spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/juejin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:huangnv}
    password: ${SPRING_DATASOURCE_PASSWORD:11447}
    driver-class-name: com.mysql.cj.jdbc.Driver
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:20MB}

app:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:juejin-media}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost/uploads}
    max-image-size-bytes: ${STORAGE_MAX_IMAGE_SIZE_BYTES:10485760}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - webp
      - gif
  article-feed-cache:
    latest-zset-key: ${ARTICLE_FEED_LATEST_ZSET_KEY:article:feed:latest}
    ranking-zset-key: ${ARTICLE_FEED_RANKING_ZSET_KEY:article:feed:ranking}
    card-hash-key-prefix: ${ARTICLE_FEED_CARD_HASH_KEY_PREFIX:article:feed:card:}
    like-user-set-key-prefix: ${ARTICLE_FEED_LIKE_USER_SET_KEY_PREFIX:article:feed:like:users:}
    favorite-user-set-key-prefix: ${ARTICLE_FEED_FAVORITE_USER_SET_KEY_PREFIX:article:feed:favorite:users:}
    like-init-key-prefix: ${ARTICLE_FEED_LIKE_INIT_KEY_PREFIX:article:feed:like:init:}
    favorite-init-key-prefix: ${ARTICLE_FEED_FAVORITE_INIT_KEY_PREFIX:article:feed:favorite:init:}
    dirty-article-set-key: ${ARTICLE_FEED_DIRTY_ARTICLE_SET_KEY:article:feed:dirty}
    max-items: ${ARTICLE_FEED_MAX_ITEMS:500}
    rebuild-interval-ms: ${ARTICLE_FEED_REBUILD_INTERVAL_MS:300000}
